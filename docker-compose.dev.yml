# ─────────────────────────────────────────────────────────────
# Development overrides — extends docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: rooeel-api-dev
    environment:
      NODE_ENV: development
      ENABLE_HTTP_LOGGING: "true"
      DATABASE_URL: postgresql://rooeel:rooeel_pass@db:5432/rooeel_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
      - /app/node_modules
    command: ["sh", "-c", "npm install && npx nest start --watch"]
    healthcheck:
      start_period: 60s

  db:
    container_name: rooeel-db-dev
    ports:
      - "5432:5432"             # expose to host for Prisma Studio / TablePlus

  redis:
    container_name: rooeel-redis-dev
    ports:
      - "6379:6379"             # expose to host for RedisInsight / redis-cli
